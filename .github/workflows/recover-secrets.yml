# ⚠️  ONE-TIME RECOVERY WORKFLOW — DELETE AFTER USE
#
# Purpose: dump KEYSTORE_PASSWORD / KEY_PASSWORD / KEY_ALIAS from GitHub
# Secrets back into a readable form so the repo owner can save them in
# a password manager. GitHub auto-masks secrets in logs (prints as ***)
# but the mask only matches the literal value — so we base64-encode each
# secret, the encoded string is unmasked, and the owner decodes locally.
#
# Manual trigger only (workflow_dispatch). DELETE THIS FILE the moment
# you've copied + decoded + saved the values.

name: 🔓 Recover keystore secrets (DELETE AFTER USE)

on:
  workflow_dispatch:

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Dump base64-encoded secrets
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo " Copy each base64 line below and decode locally with:"
          echo "   echo \"<paste-string>\" | base64 -d"
          echo " (Mac/Linux/Git-Bash) — or any online base64 decoder."
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "KEYSTORE_PASSWORD (base64):"
          printf '%s' "$KEYSTORE_PASSWORD" | base64 -w0
          echo ""
          echo ""
          echo "KEY_PASSWORD (base64):"
          printf '%s' "$KEY_PASSWORD" | base64 -w0
          echo ""
          echo ""
          echo "KEY_ALIAS (base64):"
          printf '%s' "$KEY_ALIAS" | base64 -w0
          echo ""
          echo ""
          echo "════════════════════════════════════════════════════════════"
          echo " ✅ Save these to your password manager."
          echo " ❗ Then DELETE .github/workflows/recover-secrets.yml"
          echo "════════════════════════════════════════════════════════════"
