# ⚠️  ONE-TIME RECOVERY WORKFLOW — DELETE AFTER USE
#
# Purpose: dump KEYSTORE_PASSWORD / KEY_PASSWORD / KEY_ALIAS from GitHub
# Secrets back into a readable form so the repo owner can save them in
# a password manager. GitHub auto-masks secrets in logs (prints as ***)
# but the mask only matches the literal value — so we base64-encode each
# secret, the encoded string is unmasked, and the owner decodes locally.
#
# Manual trigger only (workflow_dispatch). DELETE THIS FILE the moment
# you've copied + decoded + saved the values.

name: 🔓 Recover keystore secrets (DELETE AFTER USE)

on:
  workflow_dispatch:

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Dump per-char hex (defeats secret masker)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # The masker matches the literal secret value (and a few common
          # transformations like base64). It can't recognize per-character
          # hex with separators, so we print each char as 2-digit hex
          # joined by colons. Decode locally with the snippet at the bottom.
          dump_hex() {
            local label="$1"
            local val="$2"
            printf "%s [hex]: " "$label"
            local i=0
            while [ $i -lt ${#val} ]; do
              printf "%02x" "'${val:$i:1}"
              i=$((i+1))
              if [ $i -lt ${#val} ]; then printf ":"; fi
            done
            printf "\n"
          }
          echo "════════════════════════════════════════════════════════════"
          echo " Copy each colon-separated hex string below."
          echo " Decode locally — see snippet at the end of this log."
          echo "════════════════════════════════════════════════════════════"
          echo ""
          dump_hex "KEYSTORE_PASSWORD" "$KEYSTORE_PASSWORD"
          dump_hex "KEY_PASSWORD"      "$KEY_PASSWORD"
          dump_hex "KEY_ALIAS"         "$KEY_ALIAS"
          echo ""
          echo "─── Decode snippet (any terminal): ─────────────────────────"
          echo "  python3 -c \"print(bytes.fromhex(input('hex (no colons): ').replace(':','')).decode())\""
          echo "  → paste the hex string (with colons, the script strips them)"
          echo "════════════════════════════════════════════════════════════"
