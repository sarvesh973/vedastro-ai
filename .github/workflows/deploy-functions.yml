name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:  # allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install function dependencies
        working-directory: functions
        run: npm ci || npm install

      # Write .env file from GitHub Secrets so the deployed functions
      # have access to all keys at runtime via process.env.
      - name: Write .env file
        working-directory: functions
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
          RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
          ADMIN_EMAILS=${{ secrets.ADMIN_EMAILS }}
          EOF
          echo "✓ .env created ($(wc -l < .env) lines)"

      # Service account JSON is used by firebase-tools to authenticate.
      # GOOGLE_APPLICATION_CREDENTIALS env var points to its location.
      - name: Set up Firebase service account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $HOME/firebase-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-key.json" >> $GITHUB_ENV

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      # Knowledge base check — the file is gitignored (too large).
      # If missing, deploy proceeds but /chat returns 503.
      # TODO: download from a private storage bucket here when KB exists.
      - name: Check knowledge base
        working-directory: functions
        run: |
          if [ -f knowledge_base.json ]; then
            echo "✓ Knowledge base present ($(stat -c%s knowledge_base.json) bytes)"
          else
            echo "⚠ knowledge_base.json missing — /chat will return 503 until KB is generated"
          fi

      - name: Deploy Cloud Functions
        # Dropped `firestore:rules` from --only because the rules deploy
        # invokes serviceusage.googleapis.com to verify firestore is
        # enabled, which requires Service Usage Admin on the service
        # account. The current FIREBASE_SERVICE_ACCOUNT lacks that role
        # and has been failing every deploy with HTTP 403. Functions
        # alone don't hit that API. Rules can be deployed manually with
        # `firebase deploy --only firestore:rules` after IAM is fixed.
        run: |
          firebase deploy \
            --only functions \
            --project vedastro-ai \
            --non-interactive \
            --force

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f $HOME/firebase-key.json
          rm -f functions/.env
