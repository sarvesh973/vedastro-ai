name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Create API config from secret
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p lib/config
          echo "class ApiConfig {" > lib/config/api_config.dart
          echo "  static const String geminiApiKey = '$GEMINI_KEY';" >> lib/config/api_config.dart
          echo "  static bool get isConfigured => geminiApiKey != 'YOUR_GEMINI_API_KEY_HERE';" >> lib/config/api_config.dart
          echo "}" >> lib/config/api_config.dart

      - name: Set up release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "KEYSTORE_BASE64 length: ${#KEYSTORE_BASE64}"
          echo "KEY_ALIAS: $KEY_ALIAS"
          echo "KEYSTORE_PASSWORD set: $([ -n "$KEYSTORE_PASSWORD" ] && echo YES || echo NO)"
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/vedastro-release.jks
          ls -la android/app/vedastro-release.jks
          echo "storePassword=$KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=vedastro-release.jks" >> android/key.properties
          echo "--- key.properties ---"
          cat android/key.properties | sed 's/Password=.*/Password=***/'

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: VedAstro-AI-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload debug APK as fallback
        if: failure()
        run: flutter build apk --debug

      - name: Upload Debug APK (fallback)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: VedAstro-AI-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
