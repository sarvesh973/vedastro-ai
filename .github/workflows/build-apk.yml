name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Create API config from secret
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p lib/config
          echo "class ApiConfig {" > lib/config/api_config.dart
          echo "  static const String geminiApiKey = '$GEMINI_KEY';" >> lib/config/api_config.dart
          echo "  static bool get isConfigured => geminiApiKey != 'YOUR_GEMINI_API_KEY_HERE';" >> lib/config/api_config.dart
          echo "}" >> lib/config/api_config.dart
          cat lib/config/api_config.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VedAstro-AI-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
