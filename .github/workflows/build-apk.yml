name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Create API config from GitHub Secret
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_KEY" ]; then
            echo "ERROR: GEMINI_API_KEY secret is not set in GitHub repo settings!"
            echo "Go to: Settings -> Secrets and variables -> Actions -> New repository secret"
            echo "Name: GEMINI_API_KEY"
            echo "Value: (your Gemini API key from aistudio.google.com)"
            exit 1
          fi
          echo "Gemini key length: ${#GEMINI_KEY}"
          echo "Gemini key prefix: ${GEMINI_KEY:0:4}"
          mkdir -p lib/config
          cat > lib/config/api_config.dart << DART
          class ApiConfig {
            static const String geminiApiKey = '$GEMINI_KEY';
            static const String cloudFunctionBaseUrl = 'https://vedastro-rag-server.onrender.com';
            static const String razorpayKeyId = 'rzp_test_Sdmo8azvABuanX';
            static const String razorpayCompanyName = 'VedAstro AI';
            static const int premiumPriceMonthlyPaise = 200;
            static const int premiumPriceYearlyPaise = 200;
            static bool get isConfigured => geminiApiKey.isNotEmpty && geminiApiKey != 'INJECTED_BY_CI_AT_BUILD_TIME' && geminiApiKey.length > 30;
            static bool get isRazorpayConfigured => razorpayKeyId.isNotEmpty && !razorpayKeyId.contains('YOUR_KEY');
          }
          DART

      - name: Set up release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "=== Debug: checking secrets ==="
          echo "KEYSTORE_BASE64 length: ${#KEYSTORE_BASE64}"
          echo "KEY_ALIAS: $KEY_ALIAS"
          echo "KEYSTORE_PASSWORD set: $([ -n "$KEYSTORE_PASSWORD" ] && echo YES || echo NO)"
          echo "KEY_PASSWORD set: $([ -n "$KEY_PASSWORD" ] && echo YES || echo NO)"

          if [ -n "$KEYSTORE_BASE64" ] && [ ${#KEYSTORE_BASE64} -gt 100 ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/vedastro-release.jks
            echo "Keystore file created:"
            ls -la android/app/vedastro-release.jks

            echo "storePassword=$KEYSTORE_PASSWORD" > android/key.properties
            echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
            echo "keyAlias=$KEY_ALIAS" >> android/key.properties
            echo "storeFile=vedastro-release.jks" >> android/key.properties

            echo "=== key.properties ==="
            cat android/key.properties | sed 's/Password=.*/Password=***/'
            echo "RELEASE_BUILD=true" >> $GITHUB_ENV
          else
            echo "WARNING: Keystore secrets not configured, will build debug APK"
            echo "RELEASE_BUILD=false" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          if [ "$RELEASE_BUILD" = "true" ]; then
            echo "Building RELEASE APK..."
            flutter build apk --release
          else
            echo "Building DEBUG APK (no keystore)..."
            flutter build apk --debug
          fi

      - name: Upload Release APK
        if: env.RELEASE_BUILD == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: VedAstro-AI-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload Debug APK
        if: env.RELEASE_BUILD != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: VedAstro-AI-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
