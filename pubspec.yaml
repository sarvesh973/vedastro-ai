name: vedastro_ai
description: VedAstro AI - Vedic Astrology & Palm Reading Platform
publish_to: 'none'
version: 1.1.4+6

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  google_fonts: ^6.1.0
  image_picker: ^1.0.7
  animated_text_kit: ^4.2.2
  shimmer: ^3.0.0
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  flutter_animate: ^4.3.0
  cupertino_icons: ^1.0.6
  google_generative_ai: ^0.4.6
  http: ^1.2.0
  smooth_page_indicator: ^1.1.0
  cached_network_image: ^3.3.1
  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.8
  firebase_crashlytics: ^4.3.10
  firebase_analytics: ^11.4.0
  google_sign_in: ^6.2.2
  razorpay_flutter: ^1.3.7
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icon/
    - assets/legal/

# ─── App Icon Config ──────────────────────────
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#0A0A1A"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

# ─── Splash Screen Config ─────────────────────
# Splash uses the round Om-mandala only (no wordmark/tagline). The
# image (1600×1600) places the mandala in the inner ~55% of the canvas
# so content sits well inside any Android 12 circular mask safe zone.
#
# IMPORTANT: icon_background_color is intentionally NOT set for android_12.
# When set, Android 12 treats the image as an adaptive icon foreground
# (108dp content area, 72dp safe zone) and clips aggressively. Omitting
# it switches to the wider layout (192dp circle, 152dp content area).
# The "moksha" wordmark + tagline reveal happens right after on
# AnimatedSplashScreen (in-app) with a fade-up animation.
flutter_native_splash:
  color: "#0A0A1A"
  image: "assets/icon/app_splash_logo.png"
  image_dark: "assets/icon/app_splash_logo.png"
  color_dark: "#0A0A1A"
  android: true
  ios: false
  android_12:
    color: "#0A0A1A"
    image: "assets/icon/app_splash_logo.png"
