name: vedastro_ai
description: VedAstro AI - Vedic Astrology & Palm Reading Platform
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  google_fonts: ^6.1.0
  image_picker: ^1.0.7
  animated_text_kit: ^4.2.2
  shimmer: ^3.0.0
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  flutter_animate: ^4.3.0
  cupertino_icons: ^1.0.6
  google_generative_ai: ^0.4.6
  smooth_page_indicator: ^1.1.0
  cached_network_image: ^3.3.1
  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.8
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icon/

# ─── App Icon Config ──────────────────────────
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#0A0A1A"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

# ─── Splash Screen Config ─────────────────────
flutter_native_splash:
  color: "#0A0A1A"
  image: "assets/icon/app_icon.png"
  image_dark: "assets/icon/app_icon.png"
  color_dark: "#0A0A1A"
  android: true
  ios: true
  android_12:
    color: "#0A0A1A"
    icon_background_color: "#0A0A1A"
    image: "assets/icon/app_icon_foreground.png"
